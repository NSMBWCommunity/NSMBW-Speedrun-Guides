<style>

/* gif container with blue oval border */
.gif-container {
  display: flex;
  justify-content: center;
}

.gif-container img {
  display: block;
  max-width: 720px;
  width: 100%;
  height: auto;
  box-sizing: border-box;

  /* Space so oval shows around image */
  padding: 28px 40px;

  /* Main oval color (dark blue) */
  background-color: #1f7dbb;

  /* Create oval shape */
  border-radius: 999px;

  /* Inner lighter oval layer */
  box-shadow:
    inset 0 0 0 12px #3aa0e6, /* light blue inner layer */
    0 8px 18px rgba(0, 0, 0, 0.18); /* subtle drop shadow */

  /* Keep your animation */
  opacity: 1;
  transform: translateY(0);
  transition: opacity 420ms ease-in, transform 420ms ease-in;
}

/* Centering for small text */
small {
  display: block;
  text-align: center;
}

/* Smaller text for info circle notes */
.fas.fa-info-circle + i {
  font-size: 0.92em;
}

/* for plain images that should be full width but not have the blue border */
.plain-img img{
  max-width: 100%;
  height: auto;
}

/* Button container */
.pause-button-container {
  display: inline-block;
  position: relative; /* positioning context for corners */
  max-width: 240px;
  margin: 0 auto;
  overflow: visible;
}

/* Clickable link */
.pause-button-link {
  display: block;
  text-decoration: none;
  cursor: pointer; /* hand cursor on hover */
  position: relative; /* ensures corners stay inside */
}

/* Main button image */
.button-image {
  display: block;
  width: 100%;
  height: auto;
}

/* Corner base style */
.corner {
  position: absolute;
  width: 25px;
  height: 25px;
  image-rendering: pixelated;
  animation: pulse 1200ms steps(1) infinite;
  pointer-events: none; /* clicks pass through corners */
}

/* Corner positions */
.tl { top: -1px; left: -8px; } /* top-left corner */
.tr { top: -1px; right: -8px; transform: rotate(90deg); } /* top-right corner */
.br { bottom: -1px; right: -8px; transform: rotate(180deg); } /* bottom-right corner */
.bl { bottom: -1px; left: -8px; transform: rotate(270deg); } /* bottom-left corner */

/* Teleport pulse animation */
@keyframes pulse {
  0%, 100% { margin: 0; }
  50% { margin: -8px; }
}

/* Hover effect: faster pulse */
.pause-button-link:hover .corner {
  animation-duration: 600ms;
}

</style>
