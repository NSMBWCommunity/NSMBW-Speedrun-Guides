      background-image:

/* Centering for small text */

  display: block;
  text-align: center;
}

  max-width: 100%;

/* Button Container */
.pause-button {
  display: inline-block;
  position: relative;    /* ensures corners are positioned relative to the button */
  max-width: 240px;
  text-decoration: none;
  cursor: pointer;       /* hand cursor on hover */
}

/* Make the main button image scale properly */
.pause-button > img:first-child {
  display: block;
  width: 100%;
  height: auto;
}

/* Corner Base Style */
.corner {
  position: absolute;
  width: 25px;
  height: 25px;
  image-rendering: pixelated;
  animation: pulse 1200ms steps(1) infinite;
  pointer-events: none; /* allows clicks to pass through corners */
}

/* Corner Placement */
.tl { top: -1px; left: -8px; }
.tr { top: -1px; right: -8px; transform: rotate(90deg); }
.br { bottom: -1px; right: -8px; transform: rotate(180deg); }
.bl { bottom: -1px; left: -8px; transform: rotate(270deg); }

/* Teleport Pulse Animation */
@keyframes pulse {
  0%, 100% { margin: 0; }
  50% { margin: -8px; }
}

/* Optional: pulse faster on hover for extra effect */
.pause-button:hover .corner {
  animation-duration: 600ms;
}
