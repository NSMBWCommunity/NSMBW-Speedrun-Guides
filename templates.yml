** Icon Guide **

⤤ - use for external links (include space afterwards; see resources/discord-servers)
★ - use for links to main pages within site (see index)
☆ - use for links to subpages within site (see resources/discord-servers)
▷ - use for a button that leads to the next page within a guide (see movement/speed)

